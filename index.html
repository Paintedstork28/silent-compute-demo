    .spin     { animation: spin 1s linear infinite; }
    .pulse    { animation: pulse 2s ease-in-out infinite; }
    .glow     { animation: glow 2s ease-in-out infinite; }
    .flow-r   { position:absolute; top:50%; margin-top:-4px; width:8px; height:8px; border-radius:50%; animation: flowR 1.6s ease-in-out infinite; }
    .flow-l   { position:absolute; top:50%; margin-top:-4px; width:8px; height:8px; border-radius:50%; animation: flowL 1.9s ease-in-out infinite; }

const BarChart = ({ bars, color='#6366f1' }) => {
  const mx = Math.max(...bars);
  return (
    <div style={{display:'flex', alignItems:'flex-end', gap:3, height:52}}>
      {bars.map((v,i) => (
        <div key={i} style={{flex:1, borderRadius:3, height:`${(v/mx)*100}%`,
          background:`linear-gradient(to top, ${color}cc, ${color}44)`}} />
      ))}
    </div>
  );
};

const Badge = ({ children, color='slate' }) => {
  const map = { slate:'#1e293b:#94a3b8', indigo:'#312e81:#818cf8', emerald:'#064e3b:#34d399', amber:'#78350f:#fbbf24', red:'#450a0a:#f87171', cyan:'#0c2a3a:#22d3ee' };
  const [bg,text] = (map[color]||map.slate).split(':');
  return <span style={{background:bg+'33', color:text, border:`1px solid ${text}33`}} className="text-xs px-2 py-0.5 rounded-full font-medium">{children}</span>;
};

const Login = ({ onLogin }) => {
  const [mode, setMode]   = useState('sandbox');
  const [user, setUser]   = useState('');
  const [pass, setPass]   = useState('');
  const [err,  setErr]    = useState('');
  const [busy, setBusy]   = useState(false);

  const submit = () => {
    setErr('');
    if (user === 'sl-admin' && pass === 'sl-2026') { setBusy(true); setTimeout(() => onLogin('sl'), 1100); return; }
    if (mode === 'sandbox') {
      if (user === 'admin' && pass === 'admin') { setBusy(true); setTimeout(() => onLogin('sandbox'), 1100); }
      else setErr('Invalid credentials. Use  admin / admin  for demo access.');
    } else {
      if (user.trim() && pass.trim()) { setBusy(true); setTimeout(() => onLogin('live'), 1100); }
      else setErr('Please enter your company credentials to continue.');
    }
  };

  const card = (m, label, sub, variant) => {
    const active = mode === m;
    const isSandbox = variant === 'sandbox';
    const borderCol = active ? (isSandbox ? '#4f46e5' : '#0891b2') : '#1e2d4a';
    const bgCol     = active ? (isSandbox ? '#1e1b4b22' : '#0c2a3422') : '#0d1526';
    const iconName  = isSandbox ? 'zap' : 'unlock';
    const iconCol   = active ? (isSandbox ? '#818cf8' : '#22d3ee') : '#475569';
    const badgeColor= isSandbox ? 'emerald' : 'indigo';
    const badgeText = isSandbox ? 'Active' : 'Production';
    return (
      <button onClick={() => { setMode(m); setErr(''); if(m==='sandbox'){setUser('admin');setPass('admin');}else{setUser('hdfc@silentelabs.io');setPass('hdfc-2026');} }}
        style={{padding:16, borderRadius:14, border:`1px solid ${borderCol}`, background:bgCol,
          textAlign:'left', cursor:'pointer', transition:'all .15s', width:'100%'}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <Ico n={iconName} size={15} cls="" style={{color:iconCol}} />
          <Badge color={badgeColor}>{badgeText}</Badge>
        </div>
        <div style={{fontSize:13, fontWeight:600, color:active?'#e2e8f0':'#64748b', marginBottom:3}}>{label}</div>
        <div style={{fontSize:11, color:'#475569'}}>{sub}</div>
        {active && isSandbox && <div style={{marginTop:8, fontFamily:'monospace', fontSize:11, color:'#a5b4fc', background:'#1e1b4b44', borderRadius:6, padding:'4px 8px'}}>admin / admin</div>}

  const [flow,       setFlow]     = useState(null);   // { uc, co } request flow
  const [prompt,     setPrompt]   = useState('');
  const [sending,    setSending]  = useState(false);
  const [outbound,   setOutbound] = useState(INIT_OUTBOUND);
  const [inbound,    setInbound]  = useState(INIT_INBOUND);
  const [reqView,    setReqView]  = useState('outbound');
  const [selAnalysis,setSelAn]    = useState(null);
  const [selQuery,   setSelQuery] = useState(null);
  const [encView,    setEncView]  = useState(false);
  const [anTab,      setAnTab]    = useState('insights');
  const [activeCmp,  setActiveCmp]= useState(INIT_OUTBOUND.find(r=>r.status==='computing'));
  const [cmpStage,   setCmpStage] = useState(INIT_OUTBOUND.find(r=>r.status==='computing')?.stage ?? 4);

  // auto-advance computation stage
  useEffect(() => {
    if (!activeCmp || cmpStage >= 7) return;
    const t = setTimeout(() => {
      setCmpStage(s => {
        const n = s + 1;
        if (n >= 7) setOutbound(prev => prev.map(r => r.id===activeCmp.id ? {...r, status:'completed', stage:7, matches:23441} : r));
        return n;
      });
    }, 2800);
    return () => clearTimeout(t);
  }, [cmpStage, activeCmp]);

  const sendRequest = () => {
    if (!prompt.trim()) return;
    setSending(true);
    const r = { id:`req-${Date.now()}`, uc:flow.uc.name, company:flow.co.name, prompt, status:'pending', stage:1, ts:new Date().toISOString().slice(0,16).replace('T',' '), matches:null };
    setTimeout(() => {
      setOutbound(p => [r, ...p]);
      setActiveCmp(r); setCmpStage(1);
      setTab('status'); setFlow(null); setSelUC(null); setPrompt(''); setSending(false);
    }, 1200);
  };

  const approve = (id) => {
    const req = inbound.find(r=>r.id===id);
    setInbound(p => p.filter(r=>r.id!==id));
    setActiveCmp({...req, uc:req.uc, company:req.company}); setCmpStage(2);
    setTab('status');
  };

  const S = (s,children) => ({style:s, children});

    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', background:'#070d1a'}}>

          <button onClick={onLogout} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'1px solid #1e2d4a',cursor:'pointer',padding:'5px 10px',borderRadius:8,color:'#64748b',fontSize:12}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='#334155'} onMouseLeave={e=>e.currentTarget.style.borderColor='#1e2d4a'}>
            ← Hub
          </button>
          <div style={{width:1,height:18,background:'#1e2d4a'}}/>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <div style={{width:28,height:28,borderRadius:8,background:'#6366f122',border:'1px solid #6366f144',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ico n="bar" size={13} style={{color:'#818cf8'}}/>
            </div>
            <span style={{fontSize:14,fontWeight:700,color:'#f1f5f9',letterSpacing:'-0.01em'}}>SC Insights</span>
          </div>
          <div style={{width:1,height:18,background:'#1e2d4a'}}/>
          <div style={{display:'flex', alignItems:'center', gap:6, fontSize:13}}>
            <Ico n="building" size={13} cls="" style={{color:'#64748b'}}/>

                  <tr style={{background:'#111d34'}}>
                    {['Date','Counterparty','Use Case','Records','Rate','Amount','Status'].map(h=>(
                      <th key={h} style={{padding:'9px 14px',textAlign:'left',color:'#475569',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={r.id} style={{borderTop:'1px solid #1e2d4a22',background:i%2===0?'transparent':'#0d152608'}}>
                      <td style={{padding:'9px 14px',color:'#475569',fontSize:11}}>{r.date}</td>
                      <td style={{padding:'9px 14px',color:'#e2e8f0',fontWeight:500}}>{r.company}</td>
                      <td style={{padding:'9px 14px'}}><span style={{fontSize:10,color:'#94a3b8',background:'#1e2d4a',padding:'2px 7px',borderRadius:5}}>{r.uc}</span></td>
                      <td style={{padding:'9px 14px',color:'#94a3b8',fontFamily:'monospace'}}>{(r.records/1000).toLocaleString()}K</td>
                      <td style={{padding:'9px 14px',color:'#475569',fontSize:11}}>₹{RATE_PER_K} / 1K records</td>
                      <td style={{padding:'9px 14px',color: mode==='charge'?'#f87171':'#34d399',fontWeight:700,fontFamily:'monospace'}}>
                        {mode==='charge'?'−':'+'}  {amt(r.records)}
                      </td>
                      <td style={{padding:'9px 14px'}}>
                        <Badge color={r.status==='paid'?'emerald':'amber'}>{r.status==='paid'?'Paid':'Pending'}</Badge>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
          return (
            <div className="fade-up" style={{maxWidth:820}}>

              {/* header */}
              <div style={{marginBottom:24}}>
                <h1 style={{fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Billing & Revenue</h1>
                <p style={{fontSize:13,color:'#64748b'}}>Charged per record in each computation. You pay when you raise a request. You earn when you fulfil one.</p>
              </div>

              {/* pricing rate pill */}
              <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'#111d34',border:'1px solid #1e2d4a',
                borderRadius:10,padding:'8px 16px',marginBottom:24}}>
                <Ico n="credit" size={13} style={{color:'#818cf8'}}/>
                <span style={{fontSize:12,color:'#94a3b8'}}>Current rate:</span>
                <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>₹{RATE_PER_K} per 1,000 records</span>
                <span style={{fontSize:11,color:'#475569'}}>· billed per computation · both parties</span>
              </div>

              {/* summary cards */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:32}}>
                {[
                  { label:'Total paid',       val:fmt(totalCharged),     sub:'across all charged requests',  color:'#f87171', icon:'trending' },
                  { label:'Pending charges',  val:fmt(totalPending),     sub:'in-progress computations',      color:'#fbbf24', icon:'clock'    },
                  { label:'Revenue earned',   val:fmt(totalEarned),      sub:'from fulfilled requests',        color:'#34d399', icon:'trending' },
                  { label:'Revenue pending',  val:fmt(totalEarnPending), sub:'awaiting computation completion',color:'#818cf8', icon:'clock'    },
                ].map(({label,val,sub,color,icon})=>(
                  <div key={label} style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:'16px 18px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <span style={{fontSize:11,color:'#475569',lineHeight:1.4}}>{label}</span>
                      <Ico n={icon} size={13} style={{color,marginTop:1}}/>
                    </div>
                    <div style={{fontSize:22,fontWeight:800,color,marginBottom:4}}>{val}</div>
                    <div style={{fontSize:11,color:'#334155'}}>{sub}</div>
                  </div>
                ))}
              </div>

              {/* charges section */}
              <div style={{marginBottom:28}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:2}}>Requests raised — you pay</div>
                    <div style={{fontSize:12,color:'#64748b'}}>Every data request you initiate is billed at ₹{RATE_PER_K} per 1,000 records in the computation</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:'#475569',marginBottom:2}}>Total billed</div>
                    <div style={{fontSize:18,fontWeight:800,color:'#f87171'}}>{fmt(totalCharged+totalPending)}</div>
                  </div>
                </div>
                <BillingTable rows={CHARGES} mode="charge"/>
              </div>

              {/* revenue section */}
              <div style={{marginBottom:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:2}}>Requests fulfilled — you earn</div>
                    <div style={{fontSize:12,color:'#64748b'}}>Every request you accept and provide data for generates revenue at the same ₹{RATE_PER_K} per 1,000 records rate</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:'#475569',marginBottom:2}}>Total earned</div>
                    <div style={{fontSize:18,fontWeight:800,color:'#34d399'}}>{fmt(totalEarned+totalEarnPending)}</div>
                  </div>
                </div>
                <BillingTable rows={REVENUE} mode="earn"/>
              </div>

              {/* net position */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>Net position this period</div>
                  <div style={{fontSize:11,color:'#334155'}}>Revenue earned minus charges paid</div>
                </div>
                <div style={{textAlign:'right'}}>
                  {(() => {
                    const net = (totalEarned+totalEarnPending) - (totalCharged+totalPending);
                    return <>
                      <div style={{fontSize:24,fontWeight:800,color: net>=0?'#34d399':'#f87171'}}>
                        {net>=0?'+':''}{fmt(net)}
                      </div>
                      <div style={{fontSize:11,color:'#475569',marginTop:2}}>{net>=0?'net revenue':'net spend'} this period</div>
                    </>;
                  })()}
                </div>
              </div>

            </div>
          );
        })()}

      </main>
    </div>
  );
};

const LiveOnboarding = ({ onDone, onLogout }) => {
  const [step, setStep] = useState(0);
  const [token, setToken] = useState('');
  const [copied, setCopied] = useState(null);

  const copy = (text, key) => {
    navigator.clipboard?.writeText(text).catch(()=>{});
    setCopied(key);
    setTimeout(() => setCopied(null), 1800);
  };

  const steps = [
    { title: 'Generate your install token', icon: 'key' },
    { title: 'Install the SC Node', icon: 'server' },
    { title: 'Connect your database', icon: 'database' },
    { title: 'Join the Silent Network', icon: 'shield' },
    { title: 'Verify & go live', icon: 'check' },
  ];

  const CodeBlock = ({ code, id }) => (
    <div style={{position:'relative', background:'#070d1a', border:'1px solid #1e2d4a', borderRadius:10, padding:'12px 14px', marginTop:8, fontFamily:'monospace', fontSize:12, color:'#a5b4fc', lineHeight:1.6}}>
      <pre style={{whiteSpace:'pre-wrap', wordBreak:'break-all'}}>{code}</pre>
      <button onClick={() => copy(code, id)}
        style={{position:'absolute', top:8, right:8, background:'#111d34', border:'1px solid #1e2d4a', borderRadius:6,
          padding:'3px 8px', fontSize:11, color: copied===id ? '#34d399' : '#64748b', cursor:'pointer', transition:'color .15s'}}>
        {copied===id ? 'Copied!' : 'Copy'}
      </button>
    </div>
  );

  const stepContent = [
    /* step 0 — token */
    <div key={0}>
      <p style={{fontSize:13, color:'#94a3b8', marginBottom:12, lineHeight:1.6}}>
        Your install token links your node to your Silent Compute organisation. Generate one from the SL dashboard or ask your SL contact to send you one.
      </p>
      <div style={{background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:10, padding:16, marginBottom:12}}>
        <div style={{fontSize:12, color:'#64748b', marginBottom:6}}>Paste your install token here to pre-fill the commands below</div>
        <input value={token} onChange={e=>setToken(e.target.value)}
          placeholder="sc_live_xxxxxxxxxxxxxxxxxxxx"
          style={{width:'100%', background:'#070d1a', border:'1px solid #1e2d4a', borderRadius:8, padding:'8px 12px',
            color:'#e2e8f0', fontSize:13, fontFamily:'monospace', outline:'none'}} />
      </div>
      <div style={{background:'#0c2a3422', border:'1px solid #0891b244', borderRadius:10, padding:12, display:'flex', gap:10, alignItems:'flex-start'}}>
        <Ico n="info" size={14} style={{color:'#22d3ee', flexShrink:0, marginTop:1}} />
        <div style={{fontSize:12, color:'#94a3b8', lineHeight:1.6}}>
          Don't have a token yet? <span style={{color:'#22d3ee', cursor:'pointer', textDecoration:'underline'}} onClick={() => window.open('mailto:hello@silencelaboratories.com','_blank')}>Email us</span> or <span style={{color:'#22d3ee', cursor:'pointer', textDecoration:'underline'}} onClick={() => window.open('https://cal.com','_blank')}>book a setup call</span> — we'll get you set up same day.
        </div>
      </div>
    </div>,

    /* step 1 — install */
    <div key={1}>
      <p style={{fontSize:13, color:'#94a3b8', marginBottom:12, lineHeight:1.6}}>
        Run the installer on any Linux host (Ubuntu 22+ recommended). Docker must be installed. The script pulls the SC Node image and configures the systemd service.
      </p>
      <div style={{fontSize:12, color:'#64748b', marginBottom:4}}>Prerequisites check</div>
      <CodeBlock id="prereq" code={`# Verify Docker is running\ndocker --version\n\n# Minimum: 4 vCPU · 8 GB RAM · 50 GB disk`} />
      <div style={{fontSize:12, color:'#64748b', marginBottom:4, marginTop:14}}>Install SC Node</div>
      <CodeBlock id="install" code={`curl -sSL https://install.silencelabs.io/sc-node | bash \\\n  --token ${token || 'YOUR_INSTALL_TOKEN'}`} />
      <div style={{background:'#1a1040', border:'1px solid #4f46e555', borderRadius:10, padding:12, marginTop:12, display:'flex', gap:10, alignItems:'flex-start'}}>
        <Ico n="info" size={14} style={{color:'#818cf8', flexShrink:0, marginTop:1}} />
        <div style={{fontSize:12, color:'#94a3b8', lineHeight:1.6}}>
          The installer registers your node with the Silent Network over a secure mTLS channel. No inbound firewall rules needed — only outbound 443.
        </div>
      </div>
    </div>,

    /* step 2 — connect DB */
    <div key={2}>
      <p style={{fontSize:13, color:'#94a3b8', marginBottom:12, lineHeight:1.6}}>
        Tell your node where your data lives. SC Node connects to your existing database — your data never leaves your infrastructure.
      </p>
      <DataFlowDiagram />
      <div style={{background:'#0a2218', border:'1px solid #16a34a44', borderRadius:10, padding:12, marginBottom:14, display:'flex', gap:10, alignItems:'flex-start'}}>
        <Ico n="info" size={14} style={{color:'#34d399', flexShrink:0, marginTop:1}} />
        <div style={{fontSize:12, color:'#94a3b8', lineHeight:1.6}}>
          <strong style={{color:'#34d399'}}>Starting with an evaluation?</strong> Point the connector at a sample table — even 500 rows is enough to prove the protocol works. You can reconnect to your full dataset any time.
        </div>
      </div>
      <CodeBlock id="db" code={`sc-node connect \\\n  --db-type postgres \\\n  --db-host YOUR_DB_HOST \\\n  --db-port 5432 \\\n  --db-name YOUR_DB_NAME \\\n  --db-user YOUR_DB_USER \\\n  --db-pass YOUR_DB_PASS`} />
      <div style={{marginTop:12, display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
        {[['PostgreSQL','Supported'],['MySQL / MariaDB','Supported'],['MongoDB','Beta'],['Snowflake','Coming soon']].map(([db,s])=>(
          <div key={db} style={{background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:8, padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontSize:12, color:'#e2e8f0'}}>{db}</span>
            <Badge color={s==='Supported'?'emerald':s==='Beta'?'amber':'slate'}>{s}</Badge>

        ))}

    </div>,

    /* step 3 — join network */
    <div key={3}>
      <p style={{fontSize:13, color:'#94a3b8', marginBottom:12, lineHeight:1.6}}>
        This step registers your node's cryptographic identity with the Silent Network. It generates a key pair, submits the public key to SL's coordination layer, and begins the attestation handshake.
      </p>
      <CodeBlock id="join" code={`sc-node join-network \\\n  --token ${token || 'YOUR_INSTALL_TOKEN'} \\\n  --org YOUR_ORG_SLUG`} />
      <div style={{background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:10, padding:12, marginTop:12}}>
        <div style={{fontSize:12, color:'#64748b', marginBottom:8}}>What happens during join</div>
        {[
          ['Key generation', 'Ed25519 node keypair generated on-device'],
          ['Attestation', 'SL verifies node integrity via remote attestation'],
          ['Network handshake', 'Node listed as reachable in Silent Network registry'],
        ].map(([t,d])=>(
          <div key={t} style={{display:'flex', gap:10, marginBottom:8, alignItems:'flex-start'}}>
            <div style={{width:6, height:6, borderRadius:'50%', background:'#6366f1', marginTop:5, flexShrink:0}} />
            <div>
              <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0'}}>{t}</div>
              <div style={{fontSize:11, color:'#64748b'}}>{d}</div>
            </div>
          </div>

      </div>
    </div>,

              {i < steps.length-1 && <div style={{flex:1, height:1, background: i<step?'#0891b2':'#1e2d4a', margin:'0 4px', marginBottom:20, transition:'background .3s'}} />}

        </div>

        {/* card */}
        <div style={{background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:20, padding:28, marginBottom:16}} className="fade-up" key={step}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:20}}>

              <Ico n={steps[step].icon} size={16} style={{color:'#22d3ee'}} />
            </div>
            <div>
              <div style={{fontSize:15, fontWeight:700, color:'#f1f5f9'}}>Step {step+1} — {steps[step].title}</div>
              <div style={{fontSize:11, color:'#475569'}}>{step+1} of {steps.length}</div>
            </div>
          </div>
          {stepContent[step]}
        </div>

        {/* nav */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <button onClick={() => step===0 ? onLogout() : setStep(step-1)}
            style={{background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:10, padding:'8px 18px',
              color:'#64748b', fontSize:13, cursor:'pointer'}}>
            {step===0 ? '← Back to login' : '← Back'}
          </button>
          <div style={{display:'flex', gap:8, alignItems:'center'}}>
            <button onClick={() => onDone()}
              style={{background:'none', border:'none', color:'#475569', fontSize:12, cursor:'pointer', textDecoration:'underline'}}>
              Skip — explore platform first
            </button>
            {step < steps.length-1
              ? <button onClick={() => setStep(step+1)}
                  style={{background:'linear-gradient(135deg,#0891b2,#6366f1)', border:'none', borderRadius:10,
                    padding:'8px 20px', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'}}>
                  Next step →
                </button>
              : <button onClick={() => onDone()}
                  style={{background:'linear-gradient(135deg,#0891b2,#34d399)', border:'none', borderRadius:10,
                    padding:'8px 20px', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'}}>
                  Open dashboard →
                </button>
            }
          </div>
        </div>

        {/* SL handholding CTA */}
        <div style={{marginTop:24, background:'#111d34', border:'1px solid #1e2d4a', borderRadius:14, padding:16, display:'flex', alignItems:'center', gap:14}}>
          <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Ico n="users" size={18} />
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13, fontWeight:600, color:'#e2e8f0', marginBottom:2}}>Prefer a guided setup?</div>
            <div style={{fontSize:12, color:'#64748b', lineHeight:1.5}}>Our solutions team will walk you through this live — most companies are up in under an hour.</div>
          </div>
          <button onClick={() => window.open('mailto:hello@silencelaboratories.com','_blank')}
            style={{background:'#1e1b4b', border:'1px solid #4f46e5', borderRadius:8, padding:'7px 14px',
              color:'#a5b4fc', fontSize:12, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap'}}>
            Book a call →
          </button>
        </div>

      </div>
    </div>
  );
};

const bkColor = b => ({'HDFC Bank':'#22d3ee','SBI':'#f59e0b','ICICI':'#a78bfa','Axis Bank':'#34d399','Kotak':'#f472b6','Yes Bank':'#818cf8','HDFC':'#22d3ee'}[b]||'#64748b');

const NetworkDiagram = ({ data }) => {
  const R = 27;
  const W = 420, H = data.type==='smurfing' ? 295 : 368;
  const getN = id => data.nodes.find(n => n.id === id);
  const edgePts = (fid, tid) => {
    const f = getN(fid), t = getN(tid);
    const dx = t.x-f.x, dy = t.y-f.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
    const ux = dx/dist, uy = dy/dist;
    return { x1:f.x+ux*(R+1), y1:f.y+uy*(R+1), x2:t.x-ux*(R+10), y2:t.y-uy*(R+10), mx:(f.x+t.x)/2, my:(f.y+t.y)/2, px:-uy, py:ux };
  };
  return (
    <div style={{background:'#080f1e',border:'1px solid #f8717133',borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:700,color:'#f87171',textTransform:'uppercase',letterSpacing:'0.05em'}}>
          {data.type==='circular' ? '↺  Circular transaction network' : '⬇  Smurfing network'}
        </span>
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'#475569'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'#818cf8'}}/>
          Cross-institution nodes detected via MPC
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
        <defs>
          <marker id="arh" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <polygon points="0 0, 7 3.5, 0 7" fill="#f87171bb"/>
          </marker>
        </defs>
        {data.edges.map((e,i) => {
          const p = edgePts(e.from, e.to);
          const lx = p.mx + p.px*14, ly = p.my + p.py*14;
          return (
            <g key={i}>
              <line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke="#f8717166" strokeWidth="1.5" markerEnd="url(#arh)"/>
              <text x={lx} y={ly}   textAnchor="middle" fontSize="9"  fill="#f87171bb" fontWeight="600">{e.amount}</text>
              <text x={lx} y={ly+11} textAnchor="middle" fontSize="7.5" fill="#47556999">{e.ts}</text>
            </g>
          );
        })}
        {data.nodes.map(n => {
          const c = n.subject ? '#f87171' : bkColor(n.bank);
          return (
            <g key={n.id}>
              {n.subject && <circle cx={n.x} cy={n.y} r={R+7} fill="none" stroke="#f8717133" strokeWidth="1" strokeDasharray="4,3"/>}
              <circle cx={n.x} cy={n.y} r={R} fill={c+'1a'} stroke={c} strokeWidth={n.subject?2:1.5}/>
              <text x={n.x} y={n.y-4} textAnchor="middle" fontSize="8.5" fontWeight="700" fill={c}>{n.label}</text>
              <text x={n.x} y={n.y+9} textAnchor="middle" fontSize="7.5" fill="#64748b">{n.bank}</text>
            </g>
          );
        })}
      </svg>
      <div style={{marginTop:8,background:'#0d1526',border:'1px solid #f8717122',borderRadius:8,padding:'8px 12px',fontSize:11,color:'#94a3b8',lineHeight:1.5}}>
        <span style={{color:'#f87171',fontWeight:600}}>⚠ </span>{data.summary}
      </div>
    </div>
  );
};

                        <div key={pid} style={{background:'#111d34',border:'1px solid #f8717122',borderRadius:12,padding:16,marginBottom:10}}>

                            </div>

              {NETWORK_DATA[selUser.id] && <NetworkDiagram data={NETWORK_DATA[selUser.id]} />}

              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:16,padding:20,marginBottom:16}}>

                {[
                  { ts:'2026-03-14 11:42', desc:'₹9,800 cash deposit',       flag:'Below ₹10K threshold', severity:'high'   },
                  { ts:'2026-03-14 11:39', desc:'₹9,500 cash deposit',       flag:'Structured transaction', severity:'high'  },
                  { ts:'2026-03-13 16:21', desc:'₹9,200 cash deposit',       flag:'Pattern: 3rd in 48hrs',  severity:'critical'},
                  { ts:'2026-03-11 09:14', desc:'₹48,000 transfer → USR-3351',flag:'Linked flagged account', severity:'medium'},
                ].map((t,i)=>(
                  <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:t.severity==='critical'?'#f87171':t.severity==='high'?'#fbbf24':'#818cf8',marginTop:4,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                        <span style={{fontSize:13,color:'#e2e8f0'}}>{t.desc}</span>
                        <span style={{fontSize:11,color:'#334155',fontFamily:'monospace'}}>{t.ts}</span>
                      </div>
                      <span style={{fontSize:11,color:'#f87171'}}>{t.flag}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* case actions */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:16,display:'flex',gap:10,justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'#475569'}}>Case actions</span>
                <div style={{display:'flex',gap:8}}>
                  {[['Escalate to compliance','#f87171','#f871711a'],['File STR','#fbbf24','#fbbf241a'],['Mark resolved','#34d399','#34d3991a']].map(([l,c,bg])=>(

                  ))}
                </div>
              </div>
            </div>
          )}

        </main>
      </div>
    </div>
  );
};

                    <tr style={{background:'#111d34'}}>
                      {['Entity','Type','Modules','Requests','Records','Amount','Status'].map(h=>(
                        <th key={h} style={{padding:'10px 14px',textAlign:'left',color:'#475569',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {SL_ENTITIES.sort((a,b)=>amt(b.records)-amt(a.records)).map((e,i)=>(
                      <tr key={e.id} style={{borderTop:'1px solid #1e2d4a22',background:!e.paid?'#78350f08':i%2===0?'transparent':'#0d152608'}}>
                        <td style={{padding:'10px 14px',color:'#e2e8f0',fontWeight:600}}>{e.name}</td>
                        <td style={{padding:'10px 14px'}}><span style={{fontSize:10,color:'#64748b',background:'#1e2d4a',padding:'2px 7px',borderRadius:5}}>{e.type}</span></td>
                        <td style={{padding:'10px 14px'}}>
                          <div style={{display:'flex',gap:4}}>
                            {e.modules.map(m=><span key={m} style={{fontSize:10,fontWeight:600,color:m==='SC Insights'?'#818cf8':'#22d3ee',background:m==='SC Insights'?'#6366f118':'#0891b218',padding:'2px 6px',borderRadius:4}}>{m}</span>)}
                          </div>
                        </td>
                        <td style={{padding:'10px 14px',color:'#94a3b8',textAlign:'center'}}>{e.requests}</td>
                        <td style={{padding:'10px 14px',color:'#64748b',fontFamily:'monospace'}}>{(e.records/1000000).toFixed(1)}M</td>
                        <td style={{padding:'10px 14px',color:e.paid?'#94a3b8':'#fbbf24',fontWeight:700,fontFamily:'monospace'}}>{fmtR(amt(e.records))}</td>
                        <td style={{padding:'10px 14px'}}><Badge color={e.paid?'emerald':'amber'}>{e.paid?'Paid':'Outstanding'}</Badge></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{padding:'10px 16px',borderTop:'1px solid #1e2d4a',display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:11,color:'#475569'}}>{SL_ENTITIES.filter(e=>!e.paid).length} entities with outstanding balances</span>
                  <button style={{fontSize:11,color:'#818cf8',background:'none',border:'none',cursor:'pointer'}}>Export invoices →</button>
                </div>
              </div>
            </div>
          )}

          {/* ── ENTITIES ── */}
          {tab==='entities' && (
            <div className="fade-up">
              <div style={{marginBottom:24}}>
                <h1 style={{fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Entities</h1>
                <p style={{fontSize:13,color:'#64748b'}}>All institutions on the Silent Network. Module subscriptions and usage summary.</p>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,maxWidth:820}}>
                {SL_ENTITIES.map(e=>(
                  <div key={e.id} style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:18}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:3}}>{e.name}</div>
                        <span style={{fontSize:10,color:'#64748b',background:'#1e2d4a',padding:'2px 7px',borderRadius:5}}>{e.type}</span>
                      </div>
                      <Dot online={true}/>
                    </div>
                    <div style={{display:'flex',gap:5,marginBottom:14}}>
                      {e.modules.map(m=><span key={m} style={{fontSize:10,fontWeight:700,color:m==='SC Insights'?'#818cf8':'#22d3ee',background:m==='SC Insights'?'#6366f118':'#0891b218',border:`1px solid ${m==='SC Insights'?'#6366f144':'#0891b244'}`,padding:'3px 8px',borderRadius:5}}>{m}</span>)}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                      {[['Requests',e.requests],['Records',(e.records/1000000).toFixed(1)+'M'],['Revenue',fmtR(amt(e.records))]].map(([l,v])=>(
                        <div key={l} style={{background:'#111d34',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                          <div style={{fontSize:14,fontWeight:700,color:'#e2e8f0'}}>{v}</div>
                          <div style={{fontSize:10,color:'#475569',marginTop:1}}>{l}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── REQUEST LOG ── */}
          {tab==='requests' && !selReq && (
            <div className="fade-up">
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Request Log</h1>
                <p style={{fontSize:13,color:'#64748b'}}>All computation requests across the network. Metadata only — results are encrypted end-to-end and not accessible to SL.</p>
              </div>
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,overflow:'hidden',maxWidth:900}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{background:'#111d34'}}>
                      {['Request ID','Date','Requesting entity','Counterparty','Module','Records','Amount','Result','Status'].map(h=>(
                        <th key={h} style={{padding:'9px 14px',textAlign:'left',color:'#475569',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {SL_REQUESTS.map((r,i)=>(
                      <tr key={r.id} onClick={()=>setSelReq(r)}
                        style={{borderTop:'1px solid #1e2d4a22',background:i%2===0?'transparent':'#0d152608',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#111d34'} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'transparent':'#0d152608'}>
                        <td style={{padding:'9px 14px',color:'#475569',fontFamily:'monospace',fontSize:11}}>{r.id}</td>
                        <td style={{padding:'9px 14px',color:'#475569',fontSize:11}}>{r.date}</td>
                        <td style={{padding:'9px 14px',color:'#e2e8f0',fontWeight:500}}>{r.requester}</td>
                        <td style={{padding:'9px 14px',color:'#94a3b8'}}>{r.counterparty}</td>
                        <td style={{padding:'9px 14px'}}><span style={{fontSize:10,fontWeight:700,color:r.module==='SC Insights'?'#818cf8':'#22d3ee',background:r.module==='SC Insights'?'#6366f118':'#0891b218',padding:'2px 7px',borderRadius:5}}>{r.module}</span></td>
                        <td style={{padding:'9px 14px',color:'#64748b',fontFamily:'monospace'}}>{(r.records/1000000).toFixed(1)}M</td>
                        <td style={{padding:'9px 14px',color:'#e2e8f0',fontWeight:700,fontFamily:'monospace'}}>{fmtR(amt(r.records))}</td>
                        <td style={{padding:'9px 14px'}}>
                          <span style={{fontSize:10,color:'#1e3a5f',background:'#0c1628',border:'1px solid #1e2d4a',padding:'2px 8px',borderRadius:5,fontFamily:'monospace'}}>
                            [ENCRYPTED]
                          </span>
                        </td>
                        <td style={{padding:'9px 14px'}}><Badge color={statusColor(r.status)}>{r.status}</Badge></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{padding:'10px 14px',borderTop:'1px solid #1e2d4a',fontSize:11,color:'#334155',display:'flex',alignItems:'center',gap:8}}>
                  <Ico n="shield" size={11} style={{color:'#334155'}}/>
                  Result fields are cryptographically sealed. SL's servers process metadata only — computation outputs go directly node-to-node.
                </div>
              </div>
            </div>
          )}

          {/* ── REQUEST DETAIL ── */}
          {tab==='requests' && selReq && (
            <div className="fade-up" style={{maxWidth:640}}>
              <button onClick={()=>setSelReq(null)} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#64748b',background:'none',border:'none',cursor:'pointer',marginBottom:20,padding:0}}>
                <span style={{transform:'rotate(180deg)',display:'inline-block'}}><Ico n="chevR" size={14}/></span> Back to log
              </button>
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:18,padding:24,marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Request {selReq.id}</div>
                    <div style={{fontSize:12,color:'#64748b'}}>{selReq.requester} → {selReq.counterparty} · {selReq.date}</div>
                  </div>
                  <Badge color={statusColor(selReq.status)}>{selReq.status}</Badge>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
                  {[['Module',selReq.module],['Records',(selReq.records/1000000).toFixed(1)+'M'],['Billed',fmtR(amt(selReq.records))]].map(([l,v])=>(
                    <div key={l} style={{background:'#111d34',borderRadius:10,padding:'12px 14px',textAlign:'center'}}>
                      <div style={{fontSize:15,fontWeight:700,color:'#e2e8f0'}}>{v}</div>
                      <div style={{fontSize:11,color:'#475569',marginTop:2}}>{l}</div>
                    </div>
                  ))}
                </div>
                {/* audit metadata */}
                <div style={{background:'#111d34',border:'1px solid #1e2d4a',borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#94a3b8',marginBottom:12}}>Computation metadata</div>
                  {[['Request ID',selReq.id],['Requesting entity',selReq.requester],['Counterparty',selReq.counterparty],['Module',selReq.module],['Records in computation',(selReq.records/1000).toLocaleString()+'K'],['Protocol','Private Set Intersection (PSI)'],['Initiated',selReq.date+' 09:15:22'],['Completed',selReq.date+' 09:15:27']].map(([l,v])=>(
                    <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #1e2d4a22'}}>
                      <span style={{fontSize:11,color:'#475569'}}>{l}</span>
                      <span style={{fontSize:11,color:'#94a3b8',fontFamily:l.includes('ID')||l.includes('Records')||l.includes('Protocol')?'monospace':'inherit'}}>{v}</span>
                    </div>
                  ))}
                </div>
                {/* encrypted result */}
                <div style={{background:'#0a1628',border:'1px solid #1e3a5f',borderRadius:12,padding:20,textAlign:'center'}}>
                  <div style={{width:40,height:40,borderRadius:10,background:'#111d34',border:'1px solid #1e2d4a',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
                    <Ico n="lock" size={18} style={{color:'#334155'}}/>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:'#334155',marginBottom:6}}>Computation result — not accessible</div>
                  <div style={{fontSize:12,color:'#1e3a5f',lineHeight:1.5,marginBottom:12}}>The output of this computation was delivered directly to the authorised parties via their SC nodes. SL's coordination layer facilitated the handshake but never received or stored the result.</div>
                  <div style={{fontFamily:'monospace',fontSize:11,color:'#1e3a5f',background:'#070d1a',border:'1px solid #1e2d4a',borderRadius:8,padding:'8px 12px',textAlign:'left',lineHeight:1.8}}>
                    result_payload: [ENCRYPTED — AES-256-GCM]<br/>
                    decryption_key: held by authorised parties only<br/>
                    sl_access: NONE
                  </div>
                </div>
              </div>
            </div>
          )}

        </main>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   ROOT
───────────────────────────────────────── */
const App = () => {
  const [screen, setScreen] = useState('login');
  const [mode,   setMode]   = useState('sandbox');
  const [newUser,setNew]    = useState(true);

  return <>
    {screen==='login'          && <Login          onLogin={m=>{ setMode(m); setScreen(m==='sl'?'sl': m==='live'?'live-onboarding': newUser?'onboarding':'hub'); }} />}
    {screen==='onboarding'     && <Onboarding     onDone={()=>{setNew(false); setScreen('hub');}} />}
    {screen==='live-onboarding'&& <LiveOnboarding onDone={()=>setScreen('hub')} onLogout={()=>setScreen('login')} />}
    {screen==='hub'            && <ModuleHub      mode={mode} onSelect={m=>setScreen(m==='guard'?'guard':'dashboard')} onLogout={()=>setScreen('login')} />}
    {screen==='dashboard'      && <Dashboard      mode={mode} onLogout={()=>setScreen('hub')} />}
    {screen==='guard'          && <SCGuard        mode={mode} onBack={()=>setScreen('hub')} />}
    {screen==='sl'             && <SLDashboard    onLogout={()=>setScreen('login')} />}
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
