    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Inter', sans-serif; background: #070d1a; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0d1526; }
    ::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 4px; }
    select option { background: #111d34; color: #e2e8f0; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.35; } }
    @keyframes glow     { 0%,100% { box-shadow:0 0 8px #6366f155; } 50% { box-shadow:0 0 22px #6366f199; } }
    @keyframes flowR    { 0% { left:0;             opacity:0; } 12%{ opacity:1; } 88%{ opacity:1; } 100%{ left:calc(100% - 8px); opacity:0; } }
    @keyframes flowL    { 0% { right:0;            opacity:0; } 12%{ opacity:1; } 88%{ opacity:1; } 100%{ right:calc(100% - 8px); opacity:0; } }

    .fade-up  { animation: fadeUp .3s ease forwards; }
    .spin     { animation: spin 1s linear infinite; }
    .pulse    { animation: pulse 2s ease-in-out infinite; }
    .glow     { animation: glow 2s ease-in-out infinite; }
    .flow-r   { position:absolute; top:50%; margin-top:-4px; width:8px; height:8px; border-radius:50%; animation: flowR 1.6s ease-in-out infinite; }
    .flow-l   { position:absolute; top:50%; margin-top:-4px; width:8px; height:8px; border-radius:50%; animation: flowL 1.9s ease-in-out infinite; }
  </style>
</head>

const Login = ({ onLogin }) => {
  const [mode, setMode]   = useState('sandbox');
  const [user, setUser]   = useState('');
  const [pass, setPass]   = useState('');
  const [err,  setErr]    = useState('');
  const [busy, setBusy]   = useState(false);

  const submit = () => {
    setErr('');
    if (mode === 'sandbox') {
      if (user === 'admin' && pass === 'admin') { setBusy(true); setTimeout(() => onLogin('sandbox'), 1100); }
      else setErr('Invalid credentials. Use  admin / admin  for sandbox access.');
    } else {
      if (user.trim() && pass.trim()) { setBusy(true); setTimeout(() => onLogin('live'), 1100); }
      else setErr('Please enter your company credentials to continue.');
    }
  };

  const card = (m, label, sub, variant) => {
    const active = mode === m;
    const isSandbox = variant === 'sandbox';
    const borderCol = active ? (isSandbox ? '#4f46e5' : '#0891b2') : '#1e2d4a';
    const bgCol     = active ? (isSandbox ? '#1e1b4b22' : '#0c2a3422') : '#0d1526';
    const iconName  = isSandbox ? 'zap' : 'unlock';
    const iconCol   = active ? (isSandbox ? '#818cf8' : '#22d3ee') : '#475569';
    const badgeColor= isSandbox ? 'emerald' : 'indigo';
    const badgeText = isSandbox ? 'Active' : 'Production';
    return (
      <button onClick={() => { setMode(m); setErr(''); }}
        style={{padding:16, borderRadius:14, border:`1px solid ${borderCol}`, background:bgCol,
          textAlign:'left', cursor:'pointer', transition:'all .15s', width:'100%'}}>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
          <Ico n={iconName} size={15} cls="" style={{color:iconCol}} />
          <Badge color={badgeColor}>{badgeText}</Badge>
        </div>
        <div style={{fontSize:13, fontWeight:600, color:active?'#e2e8f0':'#64748b', marginBottom:3}}>{label}</div>
        <div style={{fontSize:11, color:'#475569'}}>{sub}</div>

    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24,
      background:'radial-gradient(ellipse at 50% 0%, #1a1040 0%, #070d1a 65%)'}}>
      <div style={{marginBottom:36, textAlign:'center'}}>
        <div style={{display:'flex', alignItems:'center', gap:10, justifyContent:'center', marginBottom:6}}>
          <div style={{width:42, height:42, borderRadius:12, background:'linear-gradient(135deg,#6366f1,#8b5cf6)', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Ico n="shield" size={20} />
          </div>
          <span style={{fontSize:22, fontWeight:700, color:'#f1f5f9', letterSpacing:'-0.02em'}}>Silent Compute</span>
        </div>
        <span style={{fontSize:13, color:'#475569'}}>Privacy-preserving data collaboration platform</span>
      </div>

      <div style={{width:'100%', maxWidth:420, display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16}}>
        {card('sandbox', 'Sandbox Mode',  'Demo environment with mock data', 'sandbox')}
        {card('live',    'Live Mode',     'Your production environment',     'live')}
      </div>

      <div style={{width:'100%', maxWidth:420, background:'#0d1526', border:'1px solid #1e2d4a', borderRadius:18, padding:24}}>

  // auto-advance computation stage
  useEffect(() => {
    if (!activeCmp || cmpStage >= 7) return;
    const t = setTimeout(() => {
      setCmpStage(s => {
        const n = s + 1;
        if (n >= 7) setOutbound(prev => prev.map(r => r.id===activeCmp.id ? {...r, status:'completed', stage:7, matches:23441} : r));
        return n;
      });
    }, 2800);
    return () => clearTimeout(t);
  }, [cmpStage, activeCmp]);

  const sendRequest = () => {
    if (!prompt.trim()) return;
    setSending(true);
    const r = { id:`req-${Date.now()}`, uc:flow.uc.name, company:flow.co.name, prompt, status:'pending', stage:1, ts:new Date().toISOString().slice(0,16).replace('T',' '), matches:null };
    setTimeout(() => {
      setOutbound(p => [r, ...p]);
      setActiveCmp(r); setCmpStage(1);
      setTab('status'); setFlow(null); setSelUC(null); setPrompt(''); setSending(false);
    }, 1200);

                            </div>

                              ['Secure channel established','14:30:47'],['MPC protocol executed','14:30:52'],

                    <span style={{fontSize:11,color:'#475569'}}>

                    </span>

                  </div>
                </div>

            )}

          </div>
        )}

        {/* ══ BILLING ══ */}
        {tab==='billing' && (() => {
          const amt  = (records) => `₹${((records/1000)*RATE_PER_K).toLocaleString('en-IN',{maximumFractionDigits:0})}`;
          const totalCharged = CHARGES.filter(r=>r.status==='paid').reduce((s,r)=>s+(r.records/1000)*RATE_PER_K,0);
          const totalPending = CHARGES.filter(r=>r.status==='pending').reduce((s,r)=>s+(r.records/1000)*RATE_PER_K,0);
          const totalEarned  = REVENUE.filter(r=>r.status==='paid').reduce((s,r)=>s+(r.records/1000)*RATE_PER_K,0);
          const totalEarnPending = REVENUE.filter(r=>r.status==='pending').reduce((s,r)=>s+(r.records/1000)*RATE_PER_K,0);
          const fmt = (n) => `₹${n.toLocaleString('en-IN',{maximumFractionDigits:0})}`;
          const BillingTable = ({rows, mode}) => (
            <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#111d34'}}>
                    {['Date','Counterparty','Use Case','Records','Rate','Amount','Status'].map(h=>(
                      <th key={h} style={{padding:'9px 14px',textAlign:'left',color:'#475569',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>(
                    <tr key={r.id} style={{borderTop:'1px solid #1e2d4a22',background:i%2===0?'transparent':'#0d152608'}}>
                      <td style={{padding:'9px 14px',color:'#475569',fontSize:11}}>{r.date}</td>
                      <td style={{padding:'9px 14px',color:'#e2e8f0',fontWeight:500}}>{r.company}</td>
                      <td style={{padding:'9px 14px'}}><span style={{fontSize:10,color:'#94a3b8',background:'#1e2d4a',padding:'2px 7px',borderRadius:5}}>{r.uc}</span></td>
                      <td style={{padding:'9px 14px',color:'#94a3b8',fontFamily:'monospace'}}>{(r.records/1000).toLocaleString()}K</td>
                      <td style={{padding:'9px 14px',color:'#475569',fontSize:11}}>₹{RATE_PER_K} / 1K records</td>
                      <td style={{padding:'9px 14px',color: mode==='charge'?'#f87171':'#34d399',fontWeight:700,fontFamily:'monospace'}}>
                        {mode==='charge'?'−':'+'}  {amt(r.records)}
                      </td>
                      <td style={{padding:'9px 14px'}}>
                        <Badge color={r.status==='paid'?'emerald':'amber'}>{r.status==='paid'?'Paid':'Pending'}</Badge>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
          return (
            <div className="fade-up" style={{maxWidth:820}}>

              {/* header */}
              <div style={{marginBottom:24}}>
                <h1 style={{fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Billing & Revenue</h1>
                <p style={{fontSize:13,color:'#64748b'}}>Charged per record in each computation. You pay when you raise a request. You earn when you fulfil one.</p>
              </div>

              {/* pricing rate pill */}
              <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'#111d34',border:'1px solid #1e2d4a',
                borderRadius:10,padding:'8px 16px',marginBottom:24}}>
                <Ico n="credit" size={13} style={{color:'#818cf8'}}/>
                <span style={{fontSize:12,color:'#94a3b8'}}>Current rate:</span>
                <span style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>₹{RATE_PER_K} per 1,000 records</span>
                <span style={{fontSize:11,color:'#475569'}}>· billed per computation · both parties</span>
              </div>

              {/* summary cards */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:32}}>
                {[
                  { label:'Total paid',       val:fmt(totalCharged),     sub:'across all charged requests',  color:'#f87171', icon:'trending' },
                  { label:'Pending charges',  val:fmt(totalPending),     sub:'in-progress computations',      color:'#fbbf24', icon:'clock'    },
                  { label:'Revenue earned',   val:fmt(totalEarned),      sub:'from fulfilled requests',        color:'#34d399', icon:'trending' },
                  { label:'Revenue pending',  val:fmt(totalEarnPending), sub:'awaiting computation completion',color:'#818cf8', icon:'clock'    },
                ].map(({label,val,sub,color,icon})=>(
                  <div key={label} style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:'16px 18px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <span style={{fontSize:11,color:'#475569',lineHeight:1.4}}>{label}</span>
                      <Ico n={icon} size={13} style={{color,marginTop:1}}/>
                    </div>
                    <div style={{fontSize:22,fontWeight:800,color,marginBottom:4}}>{val}</div>
                    <div style={{fontSize:11,color:'#334155'}}>{sub}</div>
                  </div>
                ))}
              </div>

              {/* charges section */}
              <div style={{marginBottom:28}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:2}}>Requests raised — you pay</div>
                    <div style={{fontSize:12,color:'#64748b'}}>Every data request you initiate is billed at ₹{RATE_PER_K} per 1,000 records in the computation</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:'#475569',marginBottom:2}}>Total billed</div>
                    <div style={{fontSize:18,fontWeight:800,color:'#f87171'}}>{fmt(totalCharged+totalPending)}</div>
                  </div>
                </div>
                <BillingTable rows={CHARGES} mode="charge"/>
              </div>

              {/* revenue section */}
              <div style={{marginBottom:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:2}}>Requests fulfilled — you earn</div>
                    <div style={{fontSize:12,color:'#64748b'}}>Every request you accept and provide data for generates revenue at the same ₹{RATE_PER_K} per 1,000 records rate</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:'#475569',marginBottom:2}}>Total earned</div>
                    <div style={{fontSize:18,fontWeight:800,color:'#34d399'}}>{fmt(totalEarned+totalEarnPending)}</div>
                  </div>
                </div>
                <BillingTable rows={REVENUE} mode="earn"/>
              </div>

              {/* net position */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>Net position this period</div>
                  <div style={{fontSize:11,color:'#334155'}}>Revenue earned minus charges paid</div>
                </div>
                <div style={{textAlign:'right'}}>
                  {(() => {
                    const net = (totalEarned+totalEarnPending) - (totalCharged+totalPending);
                    return <>
                      <div style={{fontSize:24,fontWeight:800,color: net>=0?'#34d399':'#f87171'}}>
                        {net>=0?'+':''}{fmt(net)}
                      </div>
                      <div style={{fontSize:11,color:'#475569',marginTop:2}}>{net>=0?'net revenue':'net spend'} this period</div>
                    </>;
                  })()}
                </div>
              </div>

            </div>
          );
        })()}

      </main>
    </div>
  );
};

    { title: 'Generate your install token', icon: 'key' },

        <div style={{fontSize:12, color:'#94a3b8', lineHeight:1.6}}>
          Don't have a token yet? <span style={{color:'#22d3ee', cursor:'pointer', textDecoration:'underline'}} onClick={() => window.open('mailto:hello@silencelaboratories.com','_blank')}>Email us</span> or <span style={{color:'#22d3ee', cursor:'pointer', textDecoration:'underline'}} onClick={() => window.open('https://cal.com','_blank')}>book a setup call</span> — we'll get you set up same day.

        <Ico n="info" size={14} style={{color:'#818cf8', flexShrink:0, marginTop:1}} />
        <div style={{fontSize:12, color:'#94a3b8', lineHeight:1.6}}>

                  <Ico n="shield" size={12} style={{color:'#22d3ee'}}/>
                  <span style={{fontSize:11,color:'#22d3ee'}}>Data decrypted locally · SL cannot see this</span>
                </div>
              </div>

              {/* controls */}
              <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:200,background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:9,display:'flex',alignItems:'center',gap:8,padding:'0 12px'}}>
                  <Ico n="search" size={13} style={{color:'#475569'}}/>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by User ID or name…"
                    style={{flex:1,background:'none',border:'none',outline:'none',color:'#e2e8f0',fontSize:13,padding:'9px 0'}}/>
                </div>
                <div style={{display:'flex',gap:6}}>
                  {[['all','All'],['flagged','Flagged'],['review','Review'],['watch','Watch'],['clean','Clean']].map(([k,l])=>(
                    <button key={k} onClick={()=>setFilter(k)}
                      style={{padding:'7px 13px',borderRadius:8,border:`1px solid ${filter===k?'#0891b2':'#1e2d4a'}`,
                        background:filter===k?'#0891b218':'#0d1526',color:filter===k?'#22d3ee':'#64748b',fontSize:12,cursor:'pointer'}}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              {/* table */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead>
                    <tr style={{background:'#111d34'}}>
                      {['User ID','Name','Account','Risk Score','Status','Source','Patterns','Updated',''].map(h=>(
                        <th key={h} style={{padding:'9px 14px',textAlign:'left',color:'#475569',fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map((u,i)=>(
                      <tr key={u.id} style={{borderTop:'1px solid #1e2d4a22',background:u.status==='flagged'?'#1a05053a':i%2===0?'transparent':'#0d152608',cursor:'pointer'}}
                        onClick={()=>{setSelUser(u); setTab('detail');}}>
                        <td style={{padding:'9px 14px',color:'#64748b',fontFamily:'monospace',fontSize:11}}>{u.id}</td>
                        <td style={{padding:'9px 14px',color:'#e2e8f0',fontWeight:500}}>{u.name}</td>
                        <td style={{padding:'9px 14px',color:'#475569',fontFamily:'monospace',fontSize:11}}>{u.acct}</td>
                        <td style={{padding:'9px 14px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div style={{width:36,height:4,background:'#111d34',borderRadius:2}}>
                              <div style={{width:`${u.risk}%`,height:'100%',borderRadius:2,background:riskColor(u.risk)}}/>
                            </div>
                            <span style={{fontSize:12,fontWeight:700,color:riskColor(u.risk)}}>{u.risk}</span>
                          </div>
                        </td>
                        <td style={{padding:'9px 14px'}}><Badge color={u.status==='flagged'?'red':u.status==='review'?'amber':u.status==='watch'?'indigo':'emerald'}>{u.status}</Badge></td>
                        <td style={{padding:'9px 14px'}}><span style={{fontSize:11,color:'#475569',background:'#111d34',padding:'2px 7px',borderRadius:5}}>{u.source}</span></td>
                        <td style={{padding:'9px 14px'}}>
                          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            {u.patterns.map(p=><span key={p} style={{fontSize:10,color:'#f87171',background:'#f871711a',padding:'2px 6px',borderRadius:4,fontWeight:600}}>{p}</span>)}
                            {u.patterns.length===0 && <span style={{fontSize:11,color:'#334155'}}>—</span>}
                          </div>
                        </td>
                        <td style={{padding:'9px 14px',color:'#334155',fontSize:11}}>{u.updated}</td>
                        <td style={{padding:'9px 14px'}}><Ico n="chevR" size={13} style={{color:'#334155'}}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{padding:'10px 16px',borderTop:'1px solid #1e2d4a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:11,color:'#475569'}}>{filtered.length} users · {GUARD_USERS.filter(u=>u.status!=='clean').length} require attention</span>
                  <button style={{fontSize:11,color:'#22d3ee',background:'none',border:'none',cursor:'pointer',padding:0}}>Export for filing →</button>
                </div>
              </div>
            </div>
          )}

          {/* ── TAB 2: FRAUD TRENDS ── */}
          {tab==='trends' && (
            <div className="fade-up">
              <div style={{marginBottom:24}}>
                <h1 style={{fontSize:17,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>Fraud Trends</h1>
                <p style={{fontSize:13,color:'#64748b'}}>Patterns detected in your transaction data. Cross-network signals computed via MPC — you see the count, not which other banks flagged the same.</p>
              </div>

              {/* summary row */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:28}}>
                {[
                  ['Total flagged users', GUARD_USERS.filter(u=>u.status==='flagged').length,        '#f87171'],
                  ['Active patterns',     FRAUD_PATTERNS.length,                                     '#fbbf24'],
                  ['Cross-bank signals',  FRAUD_PATTERNS.reduce((s,p)=>s+p.cross,0),                 '#818cf8'],
                  ['Total exposure',      '₹37.6L',                                                  '#22d3ee'],
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:13,padding:'14px 16px'}}>
                    <div style={{fontSize:22,fontWeight:800,color:c,marginBottom:4}}>{v}</div>
                    <div style={{fontSize:11,color:'#475569'}}>{l}</div>
                  </div>
                ))}
              </div>

              {/* pattern cards */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,maxWidth:860}}>
                {FRAUD_PATTERNS.map(p=>(
                  <div key={p.id} style={{background:'#0d1526',border:`1px solid ${p.severity==='critical'?'#f8717133':'#1e2d4a'}`,borderRadius:16,padding:20}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>{p.name}</div>
                        <Badge color={sevColor(p.severity)}>{p.severity}</Badge>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:22,fontWeight:800,color:p.severity==='critical'?'#f87171':p.severity==='high'?'#fbbf24':'#94a3b8'}}>{p.count}</div>
                        <div style={{fontSize:10,color:'#475569'}}>cases</div>
                      </div>
                    </div>
                    <p style={{fontSize:12,color:'#64748b',lineHeight:1.5,marginBottom:14}}>{p.desc}</p>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12,borderTop:'1px solid #1e2d4a22'}}>
                      <div style={{display:'flex',gap:16}}>
                        <div>
                          <div style={{fontSize:11,color:'#475569'}}>Amount involved</div>
                          <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>{p.amount}</div>
                        </div>
                        <div>
                          <div style={{fontSize:11,color:'#475569'}}>Cross-bank signal</div>
                          <div style={{fontSize:13,fontWeight:700,color:'#818cf8'}}>{p.cross} other institutions</div>
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11,
                        color:p.trend>0?'#f87171':p.trend<0?'#34d399':'#475569'}}>
                        <span>{p.trend>0?'↑':p.trend<0?'↓':'→'}</span>
                        <span>{p.trend===0?'Stable':`${Math.abs(p.trend)}% vs last month`}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* cross-network note */}
              <div style={{marginTop:20,background:'#0a1628',border:'1px solid #1e3a5f',borderRadius:12,padding:'12px 16px',display:'flex',gap:10,alignItems:'flex-start',maxWidth:860}}>
                <Ico n="shield" size={13} style={{color:'#22d3ee',flexShrink:0,marginTop:1}}/>
                <div style={{fontSize:12,color:'#64748b',lineHeight:1.6}}>
                  <strong style={{color:'#94a3b8'}}>How cross-bank signals work:</strong> When SC Guard detects a pattern in your data, it runs a silent PSI against other participating institutions. You receive a count of matches — never which institution, never their raw data. The computation runs on your node; SL's coordination layer never sees transaction details.
                </div>
              </div>
            </div>
          )}

          {/* ── TAB 3: CASE DETAIL ── */}
          {tab==='detail' && !selUser && (
            <div className="fade-up" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:400,gap:16}}>
              <div style={{width:52,height:52,borderRadius:14,background:'#111d34',border:'1px solid #1e2d4a',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Ico n="search" size={22} style={{color:'#334155'}}/>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:600,color:'#475569',marginBottom:6}}>No user selected</div>
                <div style={{fontSize:12,color:'#334155'}}>Click any user in the User Database to open their case detail</div>
              </div>
              <button onClick={()=>setTab('users')} style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:9,padding:'8px 18px',color:'#64748b',fontSize:13,cursor:'pointer'}}>
                Go to User Database →
              </button>
            </div>
          )}

          {tab==='detail' && selUser && (
            <div className="fade-up" style={{maxWidth:700}}>
              <button onClick={()=>setTab('users')} style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#64748b',background:'none',border:'none',cursor:'pointer',marginBottom:20,padding:0}}>
                <span style={{transform:'rotate(180deg)',display:'inline-block'}}><Ico n="chevR" size={14}/></span> Back to database
              </button>

              {/* user header */}
              <div style={{background:'#0d1526',border:`1px solid ${selUser.status==='flagged'?'#f8717133':'#1e2d4a'}`,borderRadius:18,padding:24,marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
                  <div>
                    <div style={{fontSize:18,fontWeight:700,color:'#f1f5f9',marginBottom:4}}>{selUser.name}</div>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <span style={{fontSize:12,color:'#475569',fontFamily:'monospace'}}>{selUser.id}</span>
                      <span style={{fontSize:11,color:'#334155'}}>·</span>
                      <span style={{fontSize:12,color:'#475569',fontFamily:'monospace'}}>{selUser.acct}</span>
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:32,fontWeight:800,color:riskColor(selUser.risk)}}>{selUser.risk}</div>
                    <div style={{fontSize:11,color:'#475569'}}>Risk score · {riskLabel(selUser.risk)}</div>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                  {[['PAN',selUser.pan],['Profile source',selUser.source],['Last updated',selUser.updated]].map(([l,v])=>(
                    <div key={l} style={{background:'#111d34',borderRadius:10,padding:'10px 14px'}}>
                      <div style={{fontSize:11,color:'#475569',marginBottom:3}}>{l}</div>
                      <div style={{fontSize:13,fontWeight:600,color:'#e2e8f0',fontFamily:l==='PAN'?'monospace':'inherit'}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* patterns */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:'#f1f5f9',marginBottom:14}}>Fraud patterns detected</div>
                {selUser.patterns.length === 0
                  ? <div style={{fontSize:13,color:'#334155',padding:'12px 0',textAlign:'center'}}>No patterns flagged</div>
                  : selUser.patterns.map(pid=>{
                      const p = FRAUD_PATTERNS.find(f=>f.name===pid) || {name:pid,desc:'Pattern detected in transaction history',severity:'high',count:1,amount:'—',cross:0};
                      return (
                        <div key={pid} style={{background:'#111d34',border:'1px solid #f8717122',borderRadius:12,padding:16,marginBottom:10}}>
                          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <span style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{p.name}</span>
                              <Badge color={sevColor(p.severity)}>{p.severity}</Badge>
                            </div>
                            {p.cross>0 && <span style={{fontSize:11,color:'#818cf8'}}>Also at {p.cross} other institutions (via MPC)</span>}
                          </div>
                          <div style={{fontSize:12,color:'#64748b',lineHeight:1.5}}>{p.desc}</div>
                        </div>
                      );
                    })
                }
              </div>

              {/* transaction timeline */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:700,color:'#f1f5f9',marginBottom:14}}>Suspicious transaction timeline</div>
                {[
                  { ts:'2026-03-14 11:42', desc:'₹9,800 cash deposit',       flag:'Below ₹10K threshold', severity:'high'   },
                  { ts:'2026-03-14 11:39', desc:'₹9,500 cash deposit',       flag:'Structured transaction', severity:'high'  },
                  { ts:'2026-03-13 16:21', desc:'₹9,200 cash deposit',       flag:'Pattern: 3rd in 48hrs',  severity:'critical'},
                  { ts:'2026-03-11 09:14', desc:'₹48,000 transfer → USR-3351',flag:'Linked flagged account', severity:'medium'},
                ].map((t,i)=>(
                  <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:t.severity==='critical'?'#f87171':t.severity==='high'?'#fbbf24':'#818cf8',marginTop:4,flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                        <span style={{fontSize:13,color:'#e2e8f0'}}>{t.desc}</span>
                        <span style={{fontSize:11,color:'#334155',fontFamily:'monospace'}}>{t.ts}</span>
                      </div>
                      <span style={{fontSize:11,color:'#f87171'}}>{t.flag}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* case actions */}
              <div style={{background:'#0d1526',border:'1px solid #1e2d4a',borderRadius:14,padding:16,display:'flex',gap:10,justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'#475569'}}>Case actions</span>
                <div style={{display:'flex',gap:8}}>
                  {[['Escalate to compliance','#f87171','#f871711a'],['File STR','#fbbf24','#fbbf241a'],['Mark resolved','#34d399','#34d3991a']].map(([l,c,bg])=>(
                    <button key={l} style={{background:bg,border:`1px solid ${c}44`,borderRadius:8,padding:'7px 14px',color:c,fontSize:12,fontWeight:600,cursor:'pointer'}}>{l}</button>
                  ))}
                </div>
              </div>
            </div>
          )}

        </main>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   ROOT
───────────────────────────────────────── */
const App = () => {
  const [screen, setScreen] = useState('login');
  const [mode,   setMode]   = useState('sandbox');
  const [newUser,setNew]    = useState(true);

  return <>
    {screen==='login'          && <Login          onLogin={m=>{setMode(m); setScreen(m==='live'?'live-onboarding': newUser?'onboarding':'dashboard');}} />}
    {screen==='onboarding'     && <Onboarding     onDone={()=>{setNew(false); setScreen('hub');}} />}
    {screen==='live-onboarding'&& <LiveOnboarding onDone={()=>setScreen('hub')} onLogout={()=>setScreen('login')} />}
    {screen==='hub'            && <ModuleHub      mode={mode} onSelect={m=>setScreen(m==='guard'?'guard':'dashboard')} onLogout={()=>setScreen('login')} />}
    {screen==='dashboard'      && <Dashboard      mode={mode} onLogout={()=>setScreen('hub')} />}
    {screen==='guard'          && <SCGuard        mode={mode} onBack={()=>setScreen('hub')} />}
  </>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
