<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Stack for the Agentic Era — Silence Laboratories</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f8f6f2; color: #272b27; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #eae3d7; }
    ::-webkit-scrollbar-thumb { background: #c8c0b4; border-radius: 4px; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.5; } }
    @keyframes glow     { 0%,100% { box-shadow:0 0 0 0 #2676ff22; } 50% { box-shadow:0 0 16px 4px #2676ff33; } }
    @keyframes flowR    { 0%{left:0;opacity:0} 12%{opacity:1} 88%{opacity:1} 100%{left:calc(100% - 8px);opacity:0} }
    @keyframes badPulse { 0%,100%{box-shadow:0 0 0 0 #dc262622} 50%{box-shadow:0 0 0 6px #dc262600} }

    .fade-up   { animation: fadeUp .5s ease forwards; }
    .pulse     { animation: pulse 2.5s ease-in-out infinite; }
    .glow      { animation: glow 2.5s ease-in-out infinite; }
    .flow-dot  { position:absolute; top:50%; margin-top:-4px; width:8px; height:8px; border-radius:50%; animation: flowR 1.8s ease-in-out infinite; }
    .bad-pulse { animation: badPulse 1.8s ease-in-out infinite; }

    .gradient-text {
      background: linear-gradient(135deg, #1f54a8, #2676ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-base {
      background: #ffffff;
      border: 1px solid #e5e0d8;
      transition: all 0.2s ease;
    }
    .card-base:hover { border-color: #c8c0b4; box-shadow: 0 4px 16px rgba(0,0,0,0.06); transform: translateY(-1px); }

    .stack-card {
      background: #ffffff;
      border: 1px solid #e5e0d8;
      transition: all 0.2s ease;
    }
    .stack-card:hover { border-color: #2676ff44; box-shadow: 0 4px 20px rgba(38,118,255,0.08); transform: translateY(-1px); }

    .nav-bar {
      backdrop-filter: blur(20px);
      background: rgba(248,246,242,0.92);
      border-bottom: 1px solid #e5e0d8;
    }

    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #999999;
    }

    .btn-primary {
      background: #1f54a8;
      color: #ffffff;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2676ff; }

    .btn-ghost {
      background: transparent;
      color: #444;
      border: 1px solid #d8d3cc;
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: #999; color: #272b27; }

    .flow-line-base { position:relative; height:2px; background: #ddd8d0; overflow:visible; }
    .flow-line-red  { background: #fca5a5; }
    .flow-line-green { background: #86efac; }

    .tag-pill {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      padding: 2px 8px; border-radius: 999px;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── SVG Icon System ── */

  zap:      `<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>`,
  x:        `<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,

  alert:    `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  eye:      `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  eyeOff:   `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`,
  msg:      `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
  compute:  `<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>`,
  shard:    `<polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>`,
  arrow:    `<path d="M5 12h14M12 5l7 7-7 7"/>`,
  arrowD:   `<path d="M12 5v14M5 12l7 7 7-7"/>`,
  globe:    `<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>`,
  db:       `<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>`,
  inject:   `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="12" y1="7" x2="12" y2="15"/>`,
  docs:     `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>`,

const Icon = ({ n, size=16, cls='', style }) => <SVG ch={icons[n]} size={size} cls={cls} style={style} />;

/* ── Nav ── */
const Nav = () => (
  <nav className="nav-bar fixed top-0 left-0 right-0 z-50 px-8 py-4">
    <div className="max-w-6xl mx-auto flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="w-7 h-7 rounded-lg flex items-center justify-center"
          style={{background:'#1f54a8'}}>
          <Icon n="shard" size={14} cls="text-white" />
        </div>
        <span className="font-semibold text-sm" style={{color:'#272b27'}}>Silence Laboratories</span>
      </div>
      <div className="flex items-center gap-7 text-sm" style={{color:'#555'}}>
        {['Silent Shard','Silent Compute','AP3','Docs'].map(l => (

/* ── Hero ── */
const Hero = () => (
  <section className="pt-32 pb-20 px-6 text-center" style={{background:'#f8f6f2'}}>
    <div className="max-w-4xl mx-auto">
      <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium mb-6"

        <button className="btn-ghost px-6 py-2.5 rounded-lg font-semibold text-sm">

/* ── Flow Step ── */
const Step = ({ icon, label, sublabel, color='blue', bad=false, good=false, tag=null }) => {
  const colors = {
    blue:   { bg:'#eff6ff', border:'#bfdbfe', icon:'#2563eb', text:'#1d4ed8' },
    indigo: { bg:'#eef2ff', border:'#c7d2fe', icon:'#4f46e5', text:'#4338ca' },
    cyan:   { bg:'#ecfeff', border:'#a5f3fc', icon:'#0891b2', text:'#0e7490' },
    green:  { bg:'#f0fdf4', border:'#bbf7d0', icon:'#16a34a', text:'#15803d' },
    red:    { bg:'#fef2f2', border:'#fecaca', icon:'#dc2626', text:'#b91c1c' },
    orange: { bg:'#fff7ed', border:'#fed7aa', icon:'#ea580c', text:'#c2410c' },
    purple: { bg:'#faf5ff', border:'#e9d5ff', icon:'#9333ea', text:'#7e22ce' },
  };
  const c = colors[color] || colors.blue;
  return (
    <div className="flex flex-col items-center">
      <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-2 ${bad?'bad-pulse':''}`}
        style={{background:c.bg, border:`1.5px solid ${c.border}`}}>
        <Icon n={icon} size={20} style={{color:c.icon}} />
      </div>
      <span className="text-xs font-semibold text-center leading-tight" style={{color:'#272b27'}}>{label}</span>
      {sublabel && <span className="text-xs text-center mt-0.5 max-w-20 leading-tight" style={{color:'#999'}}>{sublabel}</span>}
      {tag && (
        <span className="tag-pill mt-1.5"
          style={{background:c.bg, color:c.text, border:`1px solid ${c.border}`}}>
          {tag}
        </span>
      )}
    </div>
  );
};

/* ── Arrow connector ── */
const Arrow = ({ red=false, green=false }) => (
  <div className="flex flex-col items-center justify-center pt-3" style={{minWidth:40}}>
    <div style={{width:48, height:2, position:'relative', overflow:'visible',
      background: red ? '#fca5a5' : green ? '#86efac' : '#ddd8d0'}}>
      {!red && <div className="flow-dot" style={{background: green ? '#16a34a' : '#2676ff'}} />}
    </div>
  </div>
);

/* ── WITHOUT SL flow ── */
const WithoutFlow = () => (
  <div>
    <div className="overflow-x-auto pb-4">
      <div className="flex items-start justify-center gap-0 min-w-max mx-auto px-4">
        <Step icon="agent" label="You" sublabel="Type request" color="blue" />
        <Arrow />
        <Step icon="cpu" label="Your Agent" sublabel="LLM agent" color="indigo" bad />

        {

        {

        {

          subtitle: 'Raw Data Exposed',
          body: 'Joint computation requires sharing raw inputs in plaintext. Both parties\' private data fully exposed.',
          vulns: ['Counterparty sees your raw data','Regulatory liability on both sides'],

      ].map(card => (
        <div key={card.title} className="rounded-xl p-5" style={{background:'#fff5f5', border:'1px solid #fecaca'}}>
          <div className="flex items-center gap-2 mb-1">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'#fee2e2', border:'1px solid #fca5a5'}}>
              <Icon n={card.icon} size={14} style={{color:'#dc2626'}} />
            </div>
            <span className="text-xs font-bold" style={{color:'#dc2626'}}>{card.title}</span>
          </div>
          <h3 className="font-semibold text-sm mb-2" style={{color:'#272b27'}}>{card.subtitle}</h3>
          <p className="text-xs leading-relaxed mb-3" style={{color:'#666'}}>{card.body}</p>
          <div className="space-y-1.5">
            {card.vulns.map(v => (
              <div key={v} className="flex items-start gap-1.5">
                <Icon n="x" size={11} style={{color:'#dc2626'}} cls="mt-0.5 flex-shrink-0" />
                <span className="text-xs" style={{color:'#666'}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  </div>
);

/* ── Compare Section (stacked) ── */
const CompareSection = () => (
  <section className="py-20 px-6" style={{background:'#f8f6f2'}}>
    <div className="max-w-6xl mx-auto">
      <div className="text-center mb-14">
